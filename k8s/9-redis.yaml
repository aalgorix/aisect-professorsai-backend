apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: profai
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: profai
  labels:
    app: redis
spec:
  replicas: 1  # Single instance for development
  # For production, use Redis Sentinel or AWS ElastiCache
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        # Persistence
        volumeMounts:
        - name: redis-data
          mountPath: /data
        # Health checks
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        # Redis configuration
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - "1gb"
        - --maxmemory-policy
        - "allkeys-lru"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: profai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi  # Adjust based on needs
  # For AWS EKS, use storageClassName: gp3 (faster, cheaper than gp2)
  # storageClassName: gp3

---
# PRODUCTION: Using Redis Labs Cloud
# Current Configuration:
# - Host: redis-10925.crce206.ap-south-1-1.ec2.cloud.redislabs.com
# - Port: 10925
# - Username: default
# - SSL: Enabled
# - Password: Stored in secrets (REDIS_PASSWORD)
#
# This deployment file is for local Kubernetes development only.
# For production, we're using Redis Labs Cloud instead of self-hosted Redis.
#
# Alternative: AWS ElastiCache Redis
# To use ElastiCache instead:
# 1. Create Redis cluster in AWS Console
# 2. Get endpoint URL
# 3. Update ConfigMap and Secrets with new Redis details
# 4. Update REDIS_URL in secrets
#
# The local Redis deployment below is DISABLED by default.
