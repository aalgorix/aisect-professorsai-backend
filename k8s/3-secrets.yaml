# Secrets - Sensitive data like API keys
# IMPORTANT: These are BASE64 encoded, not encrypted!
# For production, use AWS Secrets Manager or similar

# TO CREATE BASE64 VALUES:
# Linux/Mac: echo -n "your-api-key" | base64
# PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-api-key"))

apiVersion: v1
kind: Secret
metadata:
  name: profai-secrets
  namespace: profai
  labels:
    app: profai
type: Opaque
data:
  # ✅ UPDATED WITH YOUR ACTUAL API KEYS (Base64 Encoded)
  
  # OpenAI API Key
  OPENAI_API_KEY: "<BASE64_ENCODED_OPENAI_API_KEY>"
  
  # ElevenLabs API Key (TTS)
  ELEVENLABS_API_KEY: "<BASE64_ENCODED_ELEVENLABS_API_KEY>"
  
  # Deepgram API Key (STT)
  DEEPGRAM_API_KEY: "<BASE64_ENCODED_DEEPGRAM_API_KEY>"
  
  # Groq API Key (Optional alternative LLM)
  GROQ_API_KEY: "<BASE64_ENCODED_GROQ_API_KEY>"
  
  # Sarvam API Key (Indian TTS)
  SARVAM_API_KEY: "<BASE64_ENCODED_SARVAM_API_KEY>"
  
  # ChromaDB Cloud credentials
  CHROMA_CLOUD_API_KEY: "<BASE64_ENCODED_CHROMA_CLOUD_API_KEY>"
  CHROMA_CLOUD_TENANT: "YzRmNmQwNjYtNmI4ZS00OGQxLTgwZDktMjVkYjZhMjE4Mzll"
  CHROMA_CLOUD_DATABASE: "cHJvZmFp"
  
  # Database URL (PostgreSQL - Neon)
  DATABASE_URL: "<BASE64_ENCODED_DATABASE_URL>"
  
  # Redis URL (Redis Labs Cloud)
  REDIS_URL: "<BASE64_ENCODED_REDIS_URL>"
  
  # Redis Password (Redis Labs Cloud)
  REDIS_PASSWORD: "<BASE64_ENCODED_REDIS_PASSWORD>"

#---
# NOTE: To encode your actual API keys, run:
# PowerShell:
#   $key = "sk-proj-your-actual-openai-key"
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($key))
#
# Then replace the placeholder values above with the output
